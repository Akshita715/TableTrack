    <style>
        /* --- Base Styles & Custom Scrollbar --- */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f7fafc;
            color: #2d3748;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #edf2f7; }
        ::-webkit-scrollbar-thumb { background: #a0aec0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #718096; }

        /* --- Animations --- */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes logo-reveal {
            0% { transform: scale(0.5) rotate(-15deg); opacity: 0; }
            60% { transform: scale(1.1) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes text-fade-in {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .splash-logo { animation: logo-reveal 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .splash-text { animation: text-fade-in 1s ease-out 0.8s forwards; opacity: 0; }
       
        .view-content { animation: fadeIn 0.5s ease-in-out; }
        .modal-content-anim { animation: popIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }

        /* --- Sidebar & POS Categories --- */
        .sidebar-link.active {
            background-color: #c53030;
            color: white;
            box-shadow: 0 4px 14px 0 rgba(197, 48, 48, 0.3);
        }
        .pos-category-link.active {
            background-color: #c53030;
            color: white;
            font-weight: 600;
        }
        .pos-category-link { transition: all 0.2s ease-in-out; }
        .pos-category-link:hover { background-color: #e53e3e; color: white; }

        /* --- New POS Item Card --- */
        .pos-item-card {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
        }
        .pos-item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .pos-item-card.disabled {
            cursor: not-allowed;
            filter: grayscale(1);
            background-color: #e2e8f0;
        }
        .pos-item-card.disabled:hover { transform: none; box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1); }
        .out-of-stock-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #c53030;
            border-radius: 0.5rem;
        }

        /* --- Table View Cards --- */
        .table-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .table-card:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .table-available { background-color: #48bb78; color: white; }
        .table-occupied { background-color: #4299e1; color: white; }
        .table-reserved { background-color: #f6e05e; color: #4a5568; }

        /* --- Staff View Cards --- */
        .staff-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease-out;
        }
        .staff-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }

        /* --- KDS Flash --- */
        @keyframes kds-new-order-flash {
            0%, 100% { box-shadow: 0 0 0 4px rgba(245, 101, 101, 0.7); }
            50% { box-shadow: 0 0 0 0px rgba(245, 101, 101, 0); }
        }
        .kds-new-order { animation: kds-new-order-flash 1.5s infinite; }
    </style>

    function getTodayDateString() {
        return new Date().toISOString().split('T')[0];
    }
   
    function loadData() {
        const savedOrders = localStorage.getItem('aim-pos-orders');
        const savedReports = localStorage.getItem('aim-pos-reports');
        const savedNextOrderId = localStorage.getItem('aim-pos-nextOrderId');

        if (savedOrders) AppState.orders = JSON.parse(savedOrders);
        if (savedReports) AppState.savedReports = JSON.parse(savedReports);
        if (savedNextOrderId) AppState.nextOrderId = parseInt(savedNextOrderId);

        const lastAppDate = localStorage.getItem('aim-pos-last-date') || getTodayDateString();
        const today = getTodayDateString();

        if (lastAppDate !== today) {
            const yesterdayOrders = AppState.orders.filter(o => o.date.startsWith(lastAppDate));
            if (yesterdayOrders.length > 0) {
                saveDailyReport(lastAppDate, false);
            }
            localStorage.setItem('aim-pos-last-date', today);
        }
    }

    function saveData() {
        localStorage.setItem('aim-pos-orders', JSON.stringify(AppState.orders));
        localStorage.setItem('aim-pos-reports', JSON.stringify(AppState.savedReports));
        localStorage.setItem('aim-pos-nextOrderId', AppState.nextOrderId);
    }

    function isItemAvailable(itemId) {
        const menuItem = AppState.menu.find(item => item.id === itemId);
        if (!menuItem || !menuItem.ingredients) return true;
       
        for (const [invId, qtyNeeded] of menuItem.ingredients) {
            const inventoryItem = AppState.inventory.find(inv => inv.id === invId);
            if (!inventoryItem || inventoryItem.stock < qtyNeeded) {
                return false;
            }
        }
        return true;
    }

            document.querySelectorAll('.billing-row').forEach(row => {
                const orderId = row.dataset.orderId;
                const customerName = row.dataset.customerName;
                row.style.display = (orderId.includes(searchTerm) || customerName.includes(searchTerm)) ? '' : 'none';
            });
        });

        document.querySelectorAll('.view-bill-btn').forEach(btn => btn.addEventListener('click', (e) => {
            const orderId = parseInt(e.currentTarget.dataset.orderId);
            const order = AppState.orders.find(o => o.id === orderId);
            renderBillModal(order);
        }));
    }

    // --- EVENT HANDLERS & ACTIONS ---
    function handleAddItemToCurrentOrder(e) {
        const itemId = parseInt(e.currentTarget.dataset.itemId);
        const menuItem = AppState.menu.find(item => item.id === itemId);
        const existingItem = AppState.currentOrder.find(item => item.id === itemId);
        if (existingItem) {
            existingItem.qty++;
        } else {
            AppState.currentOrder.push({ ...menuItem, qty: 1 });
        }
        renderPosBill();
    }

    function handleUpdateQtyInOrder(e) {
        const itemId = parseInt(e.currentTarget.dataset.itemId);
        const itemIndex = AppState.currentOrder.findIndex(item => item.id === itemId);
        if (itemIndex === -1) return;

        if (e.currentTarget.classList.contains('increase-qty-btn')) {
            AppState.currentOrder[itemIndex].qty++;
        } else {
            AppState.currentOrder[itemIndex].qty--;
            if (AppState.currentOrder[itemIndex].qty === 0) {
                AppState.currentOrder.splice(itemIndex, 1);
            }
        }
        renderPosBill();
    }

    function confirmBillGeneration(e) {
        e.preventDefault();
        const customerName = document.getElementById('customer-name').value;
        const customerMobile = document.getElementById('customer-mobile').value;
        const tableId = document.getElementById('table-select').value;
        const discountPercent = parseFloat(document.getElementById('discount-percent').value) || 0;

        const subtotal = AppState.currentOrder.reduce((sum, item) => sum + (item.price * item.qty), 0);
        const discountAmount = (subtotal * discountPercent) / 100;
        const total = subtotal - discountAmount;

        const newOrder = {
            id: AppState.nextOrderId++,
            customerName,
            customerMobile,
            tableId: tableId ? parseInt(tableId) : null,
            tableName: tableId ? AppState.tables.find(t => t.id === parseInt(tableId)).name : 'Takeaway',
            items: AppState.currentOrder.map(item => ({...item, status: 'Preparing'})),
            subtotal, discountPercent, discountAmount, total,
            date: new Date().toISOString(),
            status: 'Unpaid',
            kdsStatus: 'New',
            paymentMethod: null,
        };
       
        newOrder.items.forEach(item => {
            if (item.ingredients) {
                item.ingredients.forEach(([invId, qtyUsed]) => {
                    const inventoryItem = AppState.inventory.find(inv => inv.id === invId);
                    if (inventoryItem) inventoryItem.stock -= (qtyUsed * item.qty);
                });
            }
        });

        AppState.orders.push(newOrder);
       
        if (newOrder.tableId) {
            const table = AppState.tables.find(t => t.id === newOrder.tableId);
            table.status = 'Occupied';
            table.orderId = newOrder.id;
        }

        AppState.currentOrder = [];
        document.getElementById('customer-details-form').reset();
        DOM.customerDetailsModal.classList.add('hidden');
        DOM.customerDetailsModal.classList.remove('flex');
       
        AppState.currentView = 'kds-view';
        DOM.sidebarLinks.forEach(l => l.classList.remove('active'));
        document.querySelector(`.sidebar-link[data-view="${AppState.currentView}"]`).classList.add('active');
        DOM.viewTitle.textContent = 'KDS';
        DOM.views.forEach(v => v.classList.add('hidden'));
        document.getElementById(AppState.currentView).classList.remove('hidden');
        render();
    }
   
    function handleMarkItemDone(e) {
        const orderId = parseInt(e.currentTarget.dataset.orderId);
        const itemId = parseInt(e.currentTarget.dataset.itemId);
        const order = AppState.orders.find(o => o.id === orderId);
        const item = order.items.find(i => i.id === itemId);
        if (item) item.status = 'Served';
        renderKDS();
    }
   
    function handleMarkOrderServed(e) {
        const orderId = parseInt(e.currentTarget.dataset.orderId);
        const order = AppState.orders.find(o => o.id === orderId);
        if (order) order.kdsStatus = 'Served';
        renderKDS();
    }
   
    function handleMarkAsPaid() {
        DOM.paymentMethodModal.classList.add('flex');
        DOM.paymentMethodModal.classList.remove('hidden');
    }

    function confirmPayment(method) {
        const order = AppState.orders.find(o => o.id === AppState.activeOrderId);
        if(order) {
            order.status = 'Paid';
            order.paymentMethod = method;
            if (order.tableId) {
                const table = AppState.tables.find(t => t.id === order.tableId);
                if (table) {
                    table.status = 'Available';
                    table.orderId = null;
                }
            }
        }
        DOM.paymentMethodModal.classList.add('hidden');
        DOM.paymentMethodModal.classList.remove('flex');
        DOM.billViewModal.classList.add('hidden');
        DOM.billViewModal.classList.remove('flex');
       
        render();
    }
   
    function handlePrintBill() {
        const order = AppState.orders.find(o => o.id === AppState.activeOrderId);
        if (!order) return;

        let billContent = `
        ****************************************
                     Aim Software Invoice
        ****************************************

        Order ID: #${order.id}
        Date: ${new Date(order.date).toLocaleString()}
        Table: ${order.tableName}
        Customer: ${order.customerName}
        Mobile: ${order.customerMobile || 'N/A'}

        ----------------------------------------
        Item                           Qty      Price       Total
        ----------------------------------------
        `;

        order.items.forEach(item => {
            let name = item.name.padEnd(30, ' ').substring(0, 30);
            let qty = item.qty.toString().padEnd(9, ' ');
            let price = `₹${item.price.toFixed(2)}`.padEnd(12, ' ');
            let total = `₹${(item.qty * item.price).toFixed(2)}`;
            billContent += `\n${name}${qty}${price}${total}`;
        });

        billContent += `
        ----------------------------------------
                                  Subtotal: ₹${order.subtotal.toFixed(2)}
                           Discount (${order.discountPercent}%): -₹${order.discountAmount.toFixed(2)}
        ----------------------------------------
                                     TOTAL: ₹${order.total.toFixed(2)}
        ----------------------------------------

                       Thank you for visiting!
        `;

        const blob = new Blob([billContent], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Aim-Bill-${order.id}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function handleUpdateStock(e) {
        const itemId = parseInt(e.currentTarget.dataset.itemId);
        const input = document.getElementById(`stock-input-${itemId}`);
        const amountToAdd = parseFloat(input.value);
        if (isNaN(amountToAdd) || amountToAdd <= 0) {
            alert("Please enter a valid positive number for stock.");
            return;
        }

        const item = AppState.inventory.find(i => i.id === itemId);
        if (item) item.stock += amountToAdd;
       
        input.value = '';
        render();
    }

    function handleAddStaffClick() {
        document.getElementById('staff-form').reset();
        document.getElementById('staff-id').value = '';
        document.getElementById('staff-modal-title').textContent = 'Add Staff Member';
        DOM.staffFormModal.classList.add('flex');
        DOM.staffFormModal.classList.remove('hidden');
    }

    function handleEditStaffClick(e) {
        const staffId = parseInt(e.currentTarget.closest('.staff-card').querySelector('.edit-staff-btn').dataset.staffId);
        const staff = AppState.staff.find(s => s.id === staffId);
        if (staff) {
            document.getElementById('staff-id').value = staff.id;
            document.getElementById('staff-name').value = staff.name;
            document.getElementById('staff-role').value = staff.role;
            document.getElementById('staff-shift').value = staff.shift;
            document.getElementById('staff-salary').value = staff.salary;
            document.getElementById('staff-modal-title').textContent = 'Edit Staff Member';
            DOM.staffFormModal.classList.add('flex');
            DOM.staffFormModal.classList.remove('hidden');
        }
    }

    function handleStaffFormSubmit(e) {
        e.preventDefault();
        const id = parseInt(document.getElementById('staff-id').value);
        const name = document.getElementById('staff-name').value;
        const role = document.getElementById('staff-role').value;
        const shift = document.getElementById('staff-shift').value;
        const salary = parseFloat(document.getElementById('staff-salary').value);

        if (id) {
            const staffIndex = AppState.staff.findIndex(s => s.id === id);
            if (staffIndex > -1) {
                AppState.staff[staffIndex] = { ...AppState.staff[staffIndex], name, role, shift, salary };
            }
        } else {
            AppState.staff.push({ id: AppState.nextStaffId++, name, role, shift, salary, img: `https://placehold.co/100x100/E2E8F0/4A5568?text=${name.substring(0,2)}` });
        }
       
        DOM.staffFormModal.classList.add('hidden');
        DOM.staffFormModal.classList.remove('flex');
        renderStaff();
    }

    function handleTableCardClick(e) {
        const tableId = parseInt(e.currentTarget.dataset.tableId);
        const table = AppState.tables.find(t => t.id === tableId);
        if(table.status === 'Occupied' && AppState.orders.some(o => o.id === table.orderId && o.status === 'Unpaid')) {
            alert(`Table ${table.name} is occupied with an active order (#${table.orderId}). Please clear the bill first.`);
            return;
        }
        document.getElementById('table-status-id').value = tableId;
        document.getElementById('table-modal-title').innerText = `Update ${table.name} Status`;
        DOM.tableStatusModal.classList.add('flex');
        DOM.tableStatusModal.classList.remove('hidden');
    }

    function handleTableStatusChange(e) {
        const tableId = parseInt(document.getElementById('table-status-id').value);
        const newStatus = e.currentTarget.dataset.status;
        const table = AppState.tables.find(t => t.id === tableId);
        if (table) {
            table.status = newStatus;
            if (newStatus === 'Available') {
                table.orderId = null;
            }
        }
        DOM.tableStatusModal.classList.add('hidden');
        DOM.tableStatusModal.classList.remove('flex');
        render();
    }

    function saveDailyReport(dateString, withConfirm = true) {
        const ordersForDate = AppState.orders.filter(o => o.date.startsWith(dateString));

        if (ordersForDate.length === 0) {
            if (withConfirm) alert("No orders to save for the selected date.");
            return;
        }

        if (withConfirm) {
            if (!confirm(`Are you sure you want to save the report for ${new Date(dateString).toLocaleDateString()} and clear today's data? This action cannot be undone.`)) {
                return;
            }
        }

        const totalRevenue = ordersForDate.filter(o => o.status === 'Paid').reduce((sum, o) => sum + o.total, 0);
        const totalOrders = ordersForDate.length;
       
        AppState.savedReports[dateString] = {
            date: dateString,
            totalRevenue,
            totalOrders,
            orders: [...ordersForDate]
        };

        AppState.orders = AppState.orders.filter(o => !o.date.startsWith(dateString));

        if (withConfirm) alert(`Report for ${new Date(dateString).toLocaleDateString()} saved successfully.`);
       
        AppState.dashboardDate = getTodayDateString();
        render();
    }
   
    function handleDownloadReport(e) {
        const reportDate = e.currentTarget.dataset.reportDate;
        const report = AppState.savedReports[reportDate];
        if (!report) return;

        let reportContent = `
        ****************************************
              Sales Report - Aim Software
        ****************************************

        Report Date: ${new Date(report.date).toLocaleDateString()}
       
        ----------------------------------------
        Day's Summary
        ----------------------------------------
        Total Revenue: ₹${report.totalRevenue.toFixed(2)}
        Total Orders: ${report.totalOrders}
       
        ========================================
        Order Details
        ========================================
        `;

        report.orders.forEach(order => {
            reportContent += `
        ----------------------------------------
        Order ID: #${order.id} (${order.status})
        Customer: ${order.customerName}
        Table: ${order.tableName}
        Total: ₹${order.total.toFixed(2)}
        Items:
        `;
            order.items.forEach(item => {
                reportContent += `    - ${item.qty} x ${item.name}\n`;
            });
        });

        reportContent += "\n****************************************\n         End of Report\n****************************************";

        const blob = new Blob([reportContent], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Aim-Report-${reportDate}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // --- INITIALIZATION ---
    function init() {
        generateMockMenu();
        loadData();
       
        setTimeout(() => {
            DOM.splashScreen.style.display = 'none';
            DOM.mainApp.classList.remove('hidden');
            render();
        }, 2500);
       
        DOM.sidebarLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const requestedView = e.currentTarget.dataset.view;
                if(AppState.currentView === 'new-order-view' && AppState.currentOrder.length > 0 && requestedView !== 'new-order-view') {
                    if(!confirm("You have an active order in progress. Are you sure you want to leave? The current order will be lost.")) {
                        return;
                    }
                    AppState.currentOrder = [];
                }
                AppState.currentView = requestedView;
                DOM.sidebarLinks.forEach(l => l.classList.remove('active'));
                e.currentTarget.classList.add('active');
                DOM.viewTitle.textContent = e.currentTarget.querySelector('span').textContent;
                DOM.views.forEach(v => v.classList.add('hidden'));
                document.getElementById(AppState.currentView).classList.remove('hidden');

                if (requestedView === 'dashboard-view') {
                    AppState.dashboardDate = getTodayDateString();
                }

                render();
            });
        });
       
        document.getElementById('customer-details-form').addEventListener('submit', confirmBillGeneration);
        document.getElementById('customer-details-cancel').addEventListener('click', () => {
            DOM.customerDetailsModal.classList.add('hidden');
            DOM.customerDetailsModal.classList.remove('flex');
        });

        document.querySelectorAll('.payment-method-btn').forEach(btn => {
            btn.addEventListener('click', (e) => confirmPayment(e.currentTarget.dataset.method));
        });
       
        document.getElementById('close-bill-modal-btn').addEventListener('click', () => {
            DOM.billViewModal.classList.add('hidden');
            DOM.billViewModal.classList.remove('flex');
        });
       
        document.getElementById('staff-form').addEventListener('submit', handleStaffFormSubmit);
        document.getElementById('staff-form-cancel').addEventListener('click', () => {
            DOM.staffFormModal.classList.add('hidden');
            DOM.staffFormModal.classList.remove('flex');
        });

        document.querySelectorAll('.table-status-change-btn').forEach(btn => btn.addEventListener('click', handleTableStatusChange));
        document.getElementById('table-status-cancel').addEventListener('click', () => {
            DOM.tableStatusModal.classList.add('hidden');
            DOM.tableStatusModal.classList.remove('flex');
        });

        setInterval(() => {
            const timeEl = document.getElementById('current-time');
            if (timeEl) {
                timeEl.textContent = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            }
        }, 1000);
       
        const timeEl = document.getElementById('current-time');
        if (timeEl) {
            timeEl.textContent = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }
    }

    init();

</script>
